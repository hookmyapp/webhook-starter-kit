name: CLI smoke
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pinned CLI version
        run: npm install -g @gethookmyapp/cli@0.2.0
      - name: Verify CLI + command on PATH
        run: |
          hookmyapp --version
          hookmyapp sandbox env --help
      - name: Run starter-kit unit tests
        run: |
          npm ci || npm install
          npm test
